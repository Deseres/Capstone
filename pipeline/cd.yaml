trigger:
  - master

pr:
  - none

variables:
  terraformWorkingDir: 'terraform'
  azureServiceConnection: 'AzureServiceConnection'
  terraformVersion: '1.6.6'
  buildConfiguration: 'Release'
  webAppName: 'capstone-webapp'
  webAppProject: 'code/CapstoneWebApp/CapstoneWebApp'

stages:
  # 1. Infrastructure Planning
  - stage: TerraformPlan
    displayName: 'Infrastructure Plan'
    jobs:
      - job: Plan
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self
          - task: TerraformInstaller@1
            inputs:
              terraformVersion: $(terraformVersion)
          - task: TerraformTaskV4@4
            displayName: 'Terraform Init'
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: $(terraformWorkingDir)
              backendServiceArm: $(azureServiceConnection)
              backendAzureRmResourceGroupName: 'LabCommon'
              backendAzureRmStorageAccountName: 'common71977'
              backendAzureRmContainerName: 'terraform'
              backendAzureRmKey: 'capstone.tfstate'
          - task: TerraformTaskV4@4
            displayName: 'Terraform Plan'
            inputs:
              provider: 'azurerm'
              command: 'plan'
              workingDirectory: $(terraformWorkingDir)
              environmentServiceNameAzureRM: $(azureServiceConnection)

  # 2. Infrastructure Deployment (Now starts immediately after Plan)
  - stage: TerraformApply
    displayName: 'Infrastructure Apply'
    dependsOn: TerraformPlan
    jobs:
      - job: Apply
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self
          - task: TerraformInstaller@1
            inputs:
              terraformVersion: $(terraformVersion)
          - task: TerraformTaskV4@4
            displayName: 'Terraform Init'
            inputs:
              provider: 'az